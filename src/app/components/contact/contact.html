<section id="contact" appScrollAnimation>
  <h2>Lépj velem kapcsolatba!</h2>
  <div class="contact-content">
    <div class="contact-info">
      <p>Ready to start your journey? I'd love to hear from you.</p>
      <p>Email: <a href="mailto:barbi.coach@example.com">barbi.coach@example.com</a></p>
      <p>Phone: +1 (555) 123-4567</p>
    </div>
    <div class="contact-form">
      <form>
        <input type="text" name="name" placeholder="A neved" required />
        <input type="email" name="email" placeholder="E-mail címed" required />
        <textarea name="message" placeholder="Az üzeneted" rows="5" required></textarea>
        <button type="submit">Üzenet elküldése</button>
      </form>
    </div>
  </div>
</section>
